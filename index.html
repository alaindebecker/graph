<!DOCTYPE html>

<style id="appearence">
	* { font-family: sans-serif }

	svg { background: lightyellow }
	#pnl_flow { top: 3cap }

	.box { text-align: center; padding: 12px; }
	.box { border: 1px solid grey; border-radius: 15px; background: white; cursor: default }
	.box:hover { background: gainsboro }
	.box.tobedeleted { border: 1px solid lightgrey; color: darkgrey; background: whitesmoke }

	.arrow { stroke: grey; fill: grey }
	.arrow:hover { stroke-width:4; }

	#help { position: relative; background: white  }
</style>
<style id="functional">
	#pnl_flow { position: absolute; }
	svg { width: 400vw; height: 400vh }
	.box { position: absolute; left: 0; top: 0; }
	.arrow { marker-mid: url("#markerArrow") }
	.arrow { position: absolute; }
	.arrow:hover { stroke-width:3 }
</style>


<script>
onload = function(){
	svg = document.querySelector("svg")
	drag = null

	addEventListener("mousedown", function(event) {
		dragstart(event.target, event.pageX, event.pageY) })
	addEventListener("touchstart", function(event) {
		dragstart(event.target, event.touches[0].pageX, event.touches[0].pageY) })

	addEventListener("mousemove", function(event) {
		dragmove(event.target, event.pageX, event.pageY) })
	addEventListener("touchmove", function(event) {
		dragmove(event.target, event.touches[0].pageX, event.touches[0].pageY) })

	addEventListener("mouseup", function(event) {
		dragend(event.target) })
	addEventListener("touchend", function(event) {
		dragend(event.target) })
}

dragstart = function(element, x, y){
	//console.log("start", element, x, y)
	if(element.classList.contains("box")){
		event.preventDefault()
		drag = element
		// Create box by draging the prototype box
		if(drag.classList.contains("prototype")){
			drag = drag.cloneNode(true)
			drag.classList.remove("prototype")
			drag.id = uniqueid()
			drag.innerHTML = "B"+drag.id
		}
		svg.after(drag)
		drag.x = x
		drag.y = y
		drag.dx = x - element.offsetLeft
		drag.dy = y - element.offsetTop	
	}
}
dragmove = function(element, x, y){
	//console.log("move", element, x,y)
	if(drag){
		//if(0<x-drag.dx && x-drag.dx<drag.parentElement.offsetWidth-drag.offsetWidth)
		if(0<x-drag.dx && x-drag.dx<svg.clientWidth-drag.offsetWidth)
			drag.style.left = x-drag.dx +"px"
		if(0<y-drag.dy && y-drag.dy<svg.clientHeight-drag.offsetHeight)
			drag.style.top  = y - drag.dy +"px"
		
		// Delete box if it is on left border
		if(x < drag.dx)
			drag.classList.add("tobedeleted")
		else
			drag.classList.remove("tobedeleted")
			
		drag.scrollIntoView(false)
		drawarrows()
	}
}
dragend = function(element){
	//console.log("end")
	if(drag && drag.classList.contains("tobedeleted"))
		deletebox(drag)
	
	// If the mouse is on another box, then create arrow
	if(event.target.tagName=="DIV" && event.target.classList.contains("box") && event.target!=drag){
		drag.style.left = drag.x - drag.dx +"px"
		drag.style.top  = drag.y - drag.dy +"px"

		if(!event.target.classList.contains("prototype"))
			createarrow(event.target, drag)
	}

	drawarrows()
	drag = null
}

deletebox = function(box){
	// First delete arrows starting or ending on this box
	for(a of allarrows())
		if(a.source==box.id || a.target==box.id)
			a.remove()
	box.remove()
}

createarrow = function(source, target){
	// Prevent opposite pairs of arrow 
	for(a of allarrows())
		if(source.id==a.target && target.id==a.source)
			return

	// If arrow already exists, remove it
	for(a of allarrows())
		if(source.id==a.source && target.id==a.target){
			a.remove()
			return
	}
	
	// Else create arrow
	arrow = document.createElementNS("http://www.w3.org/2000/svg", "path")
	arrow.source = source.id
	arrow.target = target.id
	arrow.classList.add("arrow")
	svg.appendChild(arrow)	
}

drawarrows = function(){
	for(a of allarrows())
		if(a.source && a.target){
			source = document.getElementById(a.source)
			target = document.getElementById(a.target)
			
			x1 = source.offsetLeft + source.offsetWidth/2
			y1 = source.offsetTop + source.offsetHeight/2
			x3 = target.offsetLeft + target.offsetWidth/2
			y3 = target.offsetTop + target.offsetHeight/2
			x2 = (x1+x3)/2
			y2 = (y1+y3)/2
			a.setAttribute("d", "M"+x1+","+y1+" L"+x2+","+y2+" L"+x3+","+y3)			
	}
}

allboxes = function(){
	return document.querySelectorAll(".box")
}

allarrows = function(){
	return document.querySelectorAll("svg path")
}

uniqueid = function(){
	n = 0
	for(x of document.querySelectorAll(".box"))
		if(Number(x.id)>n)
			n = Number(x.id)
	return n+1
}
</script>


<body>
	<div id="pnl_flow">
		<svg xmlns="http://www.w3.org/2000/svg" >
			<defs>
				<marker id="markerArrow"
					markerWidth="12" markerHeight="12" 
					refX="6" refY="6" 
					orient="auto"
					stroke="context-stroke" fill="context-fill">
					<path d="M0,2 L0,11 L12,6 z" />
				</marker>
			</defs>
		</svg>
		<div class="box prototype">new</div>
	</div>
	<details id="help"><summary>Help</summary><ul>
		<li>Move the boxes with drag & drop</li>
		<li>Create a box by draging the box labeled "New"</li>
		<li>Delete a box by draging it on the left of the panel</li>
		<li>Create an arrow by draging the target above the source</li>
		<li>Delete an arrow by draging the target above the source again</li>
	</ul></details>
</body>
